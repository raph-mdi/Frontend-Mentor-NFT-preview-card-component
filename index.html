<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="https://fonts.google.com/specimen/Outfit">
  <title>Frontend Mentor | NFT preview card component</title>
</head>

<body>
  <main>
    <div class="card">
      <section class="Section-image">
        <img src="https://res.cloudinary.com/doxow9jfk/image/upload/v1781181401/image-equilibrium_qohxfn.jpg"
          alt="image-equilibrium" id="equilibrium">
      </section>
      <section class="details">
        <h1>Equilibrium #3429</h1>
        <p>Our Equilibrium collection promotes balance and calm.</p>
        <span id="ETH">0.041ETH</span>
        <div id="space"></div><span id="time-left">3 days left</span>
      </section>
      <hr>
        <section class="creator">
          <img src="https://res.cloudinary.com/doxow9jfk/image/upload/v1781181840/image-avatar_litsaa.png"
            alt="image-avatar" width="50" height="50" id="PP">
          <span id="royalties">Creation of <a href="#">Jules Wyvern</a></span>
        </section>
    </div>
  </main>
  <br>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/rmArchiviste">rmArchiviste</a>.
  </footer>
</body>

</html>
